<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验证网页</title>
  <style>
    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
    }

    button {
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #status {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>页面运行正常 ✅</h1>
    <p>这是一个用于验证的简单网页。</p>
    <button id="btn">点击测试</button>
    <div id="status"></div>
  </div>
  <script>
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    let count = 0;

    btn.addEventListener("click", () => {
      count++;
      status.textContent = `JavaScript 正常工作，点击了 ${count} 次`;
    });
  </script>
</body>
</html>
